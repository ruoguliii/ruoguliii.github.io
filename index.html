<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Ruogu Li" />
    <meta name="description" content="Ruogu Li's personal website." />
    <title>Ruogu Li</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="page-scale">
        <header class="site-header">
            <nav class="nav" aria-label="Main navigation">
                <a class="brand" href="#">Ruogu Li</a>
                <div class="nav-links">
                    <a href="#news">News</a>
                    <a href="#research">Research</a>
                    <a href="#honors">Honors</a>
                    <a href="#experience">Experience</a>
                </div>
            </nav>
        </header>

        <main id="main" class="page">
            <section class="hero">
                <div class="hero-copy">
                    <h1>Ruogu Li</h1>
                </div>
                <figure class="portrait-card">
                    <img src="assets/ruogu-li.png" alt="Portrait of Ruogu Li" />
                </figure>
            </section>

            <section id="news" class="section empty-section">
                <div class="section-title">
                    <span>01</span>
                    <h2>News</h2>
                </div>
            </section>

            <section id="research" class="section empty-section">
                <div class="section-title">
                    <span>02</span>
                    <h2>Research</h2>
                </div>
            </section>

            <section id="honors" class="section empty-section">
                <div class="section-title">
                    <span>03</span>
                    <h2>Honors</h2>
                </div>
            </section>

            <section id="experience" class="section empty-section">
                <div class="section-title">
                    <span>04</span>
                    <h2>Experience</h2>
                </div>
            </section>
        </main>
    </div>

    <script>
        (() => {
            const minWidth = 960;
            const page = document.getElementById("page-scale");

            function scalePage() {
                if (window.innerWidth < minWidth) {
                    const scale = window.innerWidth / minWidth;
                    page.style.transform = `scale(${scale})`;
                    document.body.style.height = `${page.scrollHeight * scale}px`;
                } else {
                    page.style.transform = "none";
                    document.body.style.height = "auto";
                }
            }

            window.addEventListener("load", scalePage);
            window.addEventListener("resize", scalePage);
        })();
    </script>
</body>

</html>
